                                                <>
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                                                    </svg>
                                                    <span>Masuk & Cek Hasil</span>
                                                </>
                                            )}
                                        </button>
                                    </form>

                                </div>
                            </div>
                        </div>
                    ) : (
                        /* ==========================================================
                           SCENE 2: PORTAL HASIL KELULUSAN (LULUS / TIDAK LULUS)
                           ========================================================== */
                        <div className="flex-grow max-w-4xl w-full mx-auto p-4 sm:p-8 space-y-8 animate-fade-in print:p-0 print:max-w-full">
                            
                            <div className="flex items-center justify-between no-print border-b border-slate-200 pb-4">
                                <div className="flex items-center gap-2 text-slate-500 font-medium text-sm">
                                    <span className="bg-blue-100 text-blue-700 px-2.5 py-1 rounded-md text-xs font-bold uppercase">Siswa Terotentikasi</span>
                                    <span className="text-slate-300">|</span>
                                    <span className="font-mono text-slate-600">{studentData.nisn}</span>
                                </div>
                                <button
                                    onClick={handleLogout}
                                    className="flex items-center gap-1.5 text-rose-600 hover:text-rose-700 font-semibold text-sm transition-colors py-1.5 px-3 rounded-lg hover:bg-rose-50"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                    </svg>
                                    Keluar Portal
                                </button>
                            </div>

                            {}
                            {/* CONTAINER HASIL UTAMA */}
                            <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden print-area">
                                
                                {/* Status Banner (Lulus) */}
                                {studentData.status === 'LULUS' ? (
                                    <div className="bg-emerald-50 border-b border-emerald-100 p-8 flex flex-col sm:flex-row items-center gap-5 text-center sm:text-left">
                                        <div className="bg-emerald-500 p-3 rounded-2xl text-white shadow-lg shadow-emerald-500/20">
                                            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                        </div>
                                        <div>
                                            <span className="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-extrabold bg-emerald-100 text-emerald-800 uppercase tracking-widest mb-1.5">
                                                Dokumen Digital Valid
                                            </span>
                                            <h3 className="text-2xl sm:text-3xl font-black text-emerald-900 tracking-tight">DINYATAKAN LULUS</h3>
                                            <p className="text-xs text-emerald-700/80 mt-1 font-medium">Selamat atas keberhasilan Anda menyelesaikan masa pendidikan di SMKS Ponpes Abu Dzarrin.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-rose-50 border-b border-rose-100 p-8 flex flex-col sm:flex-row items-center gap-5 text-center sm:text-left">
                                        <div className="bg-rose-500 p-3 rounded-2xl text-white shadow-lg shadow-rose-500/20">
                                            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                        </div>
                                        <div>
                                            <span className="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-extrabold bg-rose-100 text-rose-800 uppercase tracking-widest mb-1.5">
                                                Pengumuman Resmi
                                            </span>
                                            <h3 className="text-2xl sm:text-3xl font-black text-rose-900 tracking-tight">DINYATAKAN TIDAK LULUS</h3>
                                            <p className="text-xs text-rose-700/80 mt-1 font-medium">Tetap semangat dan tidak berkecil hati. Hubungi wali kelas Anda untuk koordinasi lebih lanjut.</p>
                                        </div>
                                    </div>
                                )}

                                {}
                                {/* Detail Biodata Siswa */}
                                <div className="p-6 sm:p-10 space-y-8">
                                    
                                    <div>
                                        <h4 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                            </svg>
                                            Detail Identitas Akademik Siswa
                                        </h4>
                                        <div className="border border-slate-200/80 rounded-xl overflow-hidden bg-slate-50/50">
                                            <table className="w-full text-sm border-collapse">
                                                <tbody>
                                                    <tr className="border-b border-slate-100">
                                                        <td className="py-4 px-5 font-semibold text-slate-500 w-1/3">Nama Lengkap</td>
                                                        <td className="py-4 px-5 font-bold text-slate-900">{studentData.nama}</td>
                                                    </tr>
                                                    <tr className="border-b border-slate-100">
                                                        <td className="py-4 px-5 font-semibold text-slate-500">Nomor Induk Siswa Nasional (NISN)</td>
                                                        <td className="py-4 px-5 font-mono font-bold text-slate-800">{studentData.nisn}</td>
                                                    </tr>
                                                    <tr className="border-b border-slate-100">
                                                        <td className="py-4 px-5 font-semibold text-slate-500">Kelas / Jurusan</td>
                                                        <td className="py-4 px-5 font-medium text-slate-800">{studentData.kelas}</td>
                                                    </tr>
                                                    <tr className="border-b border-slate-100">
                                                        <td className="py-4 px-5 font-semibold text-slate-500">Nilai Rata-rata Ujian</td>
                                                        <td className="py-4 px-5 font-mono font-bold text-slate-800">{studentData.nilaiRataRata}</td>
                                                    </tr>
                                                    <tr>
                                                        <td className="py-4 px-5 font-semibold text-slate-500">Nomor SKL Resmi</td>
                                                        <td className="py-4 px-5 font-mono text-xs text-slate-600">{studentData.noSurat}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Action Buttons (Hidden on Print) */}
                                    <div className="flex flex-col sm:flex-row gap-4 pt-4 no-print border-t border-slate-100">
                                        {studentData.status === 'LULUS' && (
                                            <button
                                                onClick={handlePrint}
                                                className="flex-grow bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-emerald-600/10 transition-all flex items-center justify-center gap-2 focus:ring-4 focus:ring-emerald-200"
                                            >
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
                                                </svg>
                                                Cetak Surat Keterangan Lulus (SKL)
                                            </button>
                                        )}
                                        <button
                                            onClick={handleLogout}
                                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 px-6 rounded-xl transition-all border border-slate-300/70 text-sm flex items-center justify-center gap-2"
                                        >
                                            Kembali ke Beranda Login
                                        </button>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}

                    {/* ==========================================================
                       FOOTER / DISCLAIMER KEAMANAN (Selalu di bagian bawah)
                       ========================================================== */ }
                    <footer className="w-full bg-white border-t border-slate-200/80 py-6 px-4 no-print">
                        <div className="max-w-2xl mx-auto text-center space-y-2.5">
                            <div className="flex items-center justify-center gap-1.5 text-amber-600 text-xs font-bold uppercase tracking-wider">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                                </svg>
                                <span>Verifikasi Dokumen Resmi</span>
                            </div>
                            <p className="text-[11px] sm:text-xs text-slate-400 leading-relaxed max-w-lg mx-auto font-medium">
                                Publikasi status kelulusan di website ini bersifat informasi cepat. Keabsahan dokumen resmi mutlak mengacu pada dokumen fisik yang ditandatangani oleh Kepala Sekolah dan dicap basah oleh <strong>SMKS Ponpes Abu Dzarrin</strong>.
                            </p>
                            <div className="text-[10px] text-slate-300 pt-2 border-t border-slate-100 mt-2">
                                &copy; 2026 Tim IT SMKS Ponpes Abu Dzarrin. Hak cipta dilindungi undang-undang.
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
